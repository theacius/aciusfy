<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" aria-hidden="true">
  <defs>
    <mask id="m-gear"><rect width="512" height="512" fill="#fff"/><circle cx="256" cy="256" r="176" fill="#000"/></mask>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a8a29e"/><stop offset="100%" stop-color="#3f3f46"/>
    </linearGradient>
  </defs>
  <g mask="url(#m-gear)">
    <g transform="translate(404 404)">
      <g>
        <g stroke="url(#sg)" stroke-width="5" fill="none" stroke-linecap="round">
          <line x1="0" y1="-46" x2="0" y2="-34"/><line x1="0" y1="34" x2="0" y2="46"/>
          <line x1="-46" y1="0" x2="-34" y2="0"/><line x1="34" y1="0" x2="46" y2="0"/>
          <line x1="-32" y1="-32" x2="-24" y2="-24"/><line x1="24" y1="24" x2="32" y2="32"/>
          <line x1="32" y1="-32" x2="24" y2="-24"/><line x1="-24" y1="24" x2="-32" y2="32"/>
        </g>
        <circle r="22" fill="#57534e" stroke="#18181b" stroke-width="2"/>
        <circle r="34" stroke="#78716c" stroke-width="3" fill="none"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
      </g>
    </g>
    <circle cx="108" cy="108" r="14" fill="#57534e" stroke="#292524" stroke-width="2" opacity=".8"/>
    <circle cx="256" cy="256" r="186" stroke="#78716c" stroke-width="3.5" fill="none" opacity=".5"/>
    <circle cx="256" cy="256" r="194" stroke="#d6d3d1" stroke-width="1" opacity=".28" stroke-dasharray="7 11">
      <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="45s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
